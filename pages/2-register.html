<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Importo CSS -->
    <link href="/css/pages-css/2-register.css" rel="stylesheet" />
    <title>Registrarse</title>
  </head>
  <body>
    <div class="section-login">
      <div class="login-container">
        <!-- HEADER -->
        <div class="header-section">
          <div class="icon-container">
            <i class="ph-fill ph-cooking-pot"></i>
          </div>
          <h1 class="main-title">Algo que pedir</h1>
        </div>
        <!-- FORMULARIO -->
        <form class="form-section">
          <div class="form-group">
            <label class="label">Usuario*</label>
            <input type="email" placeholder="Escribir" class="input-primary form-input">
          </div>
          <div class="form-group password-container">
            <label class="label">Contraseña*</label>
            <div class="password-input">
              <input type="password" class="input-primary form-input">
              <i class="ph ph-eye-slash"></i>
            </div>
          </div>
          <!-- Por ahora no lo validamos  -->
          <div class="form-group">
              <label class="label">Re-ingrese la contraseña*</label>
              <div class="password-input">
                  <input type="password" class="input-primary form-input invalid-input">
                  <i class="ph ph-eye-slash"></i>
              </div>
              <div class="password-container invalid-container">
                  <i class="ph ph-warning-circle"></i>
                  <div class="invalid-text">Las contraseñas no coinciden</div>
              </div>
          </div>
        </form>
        <!-- FOOTER -->
        <div class="btn-group" role="group">
          <button class="btn btn-primary btn-login">Registrarse</button>
          <div class="register-section"> 
            <p>¿Ya tenes una cuenta?</p>
            <a href="" class="register-link">Inicia Sesión</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
