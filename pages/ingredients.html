<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">

    <title>Ingredients</title>
</head>
<body>
    <!-- section esta mal aca? Que uso? -->
    <section class="ingredients-container">
        <header class="web-header">
            <section class="logo-site-name">
                <div class="pot-container">
                    <i class="ph-fill ph-cooking-pot"></i>
                </div>
                <div>
                    <button class="site-name">
                        Algo que pedir
                    </button>
                </div>
            </section>
            
            <nav class="nav-menu">
                <button class="nav-item">
                    Pedidos
                </button>
                <button class="nav-item">
                    Menu
                </button>
                <button class="nav-item no-hid">
                    Ingredientes
                </button>
                <button class="nav-item">
                    Cuenta 
                </button>
                <button class="nav-item hidden">
                    <i class="ph ph-list"></i>
                </button>
                <button class="nav-avatar">
                    <i class="ph ph-user-circle"></i>
                </button>
            </nav>

        </header>

        <!-- Hidden navigation bar -->
        <footer class="mobile-nav">
            <div class="icon-and-text-mobile">
                <div class="pot-container">
                    <i class="ph-fill ph-cooking-pot"></i>
                </div>
                <div class="mobile-icons">
                    <i class="ph ph-shopping-cart"></i>
                    <i class="ph ph-fork-knife"></i>
                    <i class="ph ph-bowl-food"></i>
                    <i class="ph ph-user"></i>
                </div>
            </div>
        </footer>
        
        <section class="ingredients-main">

            <section class="section-title">
                <article class="ingredients-title">
                    Ingredientes
                </article>
                <div class="new-ingredient">
                    <!--Es un button-->
                    <button class="new-ingredient-btn">Nuevo Ingrediente</button>
                </div>
            </section>

            <div class="ingredients-table">
                <article class="ingredients-row">
                    <div class="ingredients-cell header">
                        Nombre
                    </div>
                    <div class="ingredients-cell header">
                        Costo
                    </div>
                    <div class="ingredients-cell header">
                        Grupo Alimenticio
                    </div>
                    <div class="ingredients-cell header">
                        Origen
                    </div>
                    <div class="ingredients-cell header gray-text">
                        Acciones
                    </div>
                </article>

                <article class="ingredients-row">
                    <div class="ingredients-cell">
                        Tomate
                    </div>
                    <div class="ingredients-cell">
                        $0.50
                    </div>
                    <div class="ingredients-cell">
                        Frutas y verduras
                    </div>
                    <div class="ingredients-cell">
                        <i class="ph ph-plant"></i>
                    </div>
                    <div class="ingredients-cell">
                        <i class="ph ph-eye hidden"></i> <i class="ph ph-line-vertical no-hover hidden"></i> <i class="ph ph-pencil"></i> <i class="ph ph-line-vertical no-hover"></i> <i class="ph ph-trash"></i>
                    </div>
                </article>

                <article class="ingredients-row">
                    <div class="ingredients-cell">
                        Pechuga de pollo
                    </div>
                    <div class="ingredients-cell">
                        $3.00
                    </div>
                    <div class="ingredients-cell">
                        Proteinas
                    </div>
                    <div class="ingredients-cell">
                        <i class="ph ph-cow"></i>
                    </div>
                    <div class="ingredients-cell">
                        <i class="ph ph-eye hidden"></i> <i class="ph ph-line-vertical no-hover hidden"></i> <i class="ph ph-pencil"></i> <i class="ph ph-line-vertical no-hover"></i> <i class="ph ph-trash"></i>
                    </div>
                </article>

                <article class="ingredients-row">
                    <div class="ingredients-cell">
                        Arroz
                    </div>
                    <div class="ingredients-cell">
                        $1.00
                    </div>
                    <div class="ingredients-cell">
                        Cereales y tuberculos
                    </div>
                    <div class="ingredients-cell">
                        <i class="ph ph-plant"></i>
                    </div>
                    <div class="ingredients-cell">
                        <i class="ph ph-eye hidden"></i> <i class="ph ph-line-vertical no-hover hidden"></i> <i class="ph ph-pencil"></i> <i class="ph ph-line-vertical no-hover"></i> <i class="ph ph-trash"></i>
                    </div>
                </article>

                <article class="ingredients-row">
                    <div class="ingredients-cell">
                        Leche
                    </div>
                    <div class="ingredients-cell">
                        $2.00
                    </div>
                    <div class="ingredients-cell">
                        Lacteos
                    </div>
                    <div class="ingredients-cell">
                        <i class="ph ph-cow"></i>
                    </div>
                    <div class="ingredients-cell">
                        <i class="ph ph-eye hidden"></i> <i class="ph ph-line-vertical no-hover hidden"></i> <i class="ph ph-pencil"></i> <i class="ph ph-line-vertical no-hover"></i> <i class="ph ph-trash"></i>
                    </div>
                </article>

                <article class="ingredients-row">
                    <div class="ingredients-cell">
                        Palta
                    </div>
                    <div class="ingredients-cell">
                        $1.50
                    </div>
                    <div class="ingredients-cell">
                        Frutas y verduras
                    </div>
                    <div class="ingredients-cell">
                        <i class="ph ph-plant"></i>
                    </div>
                    <div class="ingredients-cell">
                        <i class="ph ph-eye hidden"></i> <i class="ph ph-line-vertical no-hover hidden"></i> <i class="ph ph-pencil"></i> <i class="ph ph-line-vertical no-hover"></i> <i class="ph ph-trash"></i>
                    </div>
                </article>



            </div>

        </section>

    </section>
</body>
</html>
