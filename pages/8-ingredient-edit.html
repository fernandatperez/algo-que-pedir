<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/general.css">
    <link rel="stylesheet" href="../css/component-css/input.css">
    <link rel="stylesheet" href="../css/component-css/icon.css">
    <link rel="stylesheet" href="../css/component-css/switch-button.css">
    <link rel="stylesheet" href="../css/pages-css/8-ingredient-edit.css">
    <title>Editar ingrediente</title>

</head>
<body>
    <section class="orders-container">
        <!-- Header -->
        <header class="main-nav">

            <div class="icon-and-text">
                <a class="pot-container">
                    <i class="ph-fill ph-cooking-pot"></i>
                </a>
                <h1>Algo que pedir</h1> 
            </div>

            <nav class="options-and-icon">
                <h2>Pedidos</h2> 
                <h2>Menú</h2> 
                <h2 class="active">Ingredientes</h2> 
                <h2>Cuentas</h2> 
                <!-- <i class="ph ph-list hidden"></i> -->
                <label id="nav-hamburger" class="hidden">
                    <input type="checkbox" id="hamburger-toggle">
                    <span class="hidden"></span>
                    <span class="hidden"></span>
                    <span class="hidden"></span>
                </label>
                <i class="ph ph-user-circle"></i>
            </nav>
        </header>

        <section class="main-body">

            <article class="section-title">
                Editar ingrediente
            </article>

            <article class="ingredient-edit-section">
                <div class="input-group">
                    <label class="label-color">Nombre del ingrediente*</label>
                    <input type="text" placeholder="Lechuga" class="input-primary">
                </div>
                <div class="input-group">
                    <label class="label-color">Costo*</label>
                    <div class="input-with-icon">
                        <i class="ph ph-currency-dollar-simple input-icon-dollar"></i>
                        <input type="text" placeholder="5" class="input-primary input-ingredient-edit">
                    </div>
                </div>
                <div class="input-group">
                    <label class="label-color">Grupo Alimenticio</label>
                    <select class="input-primary">
                        <option value="" disabled selected hidden>Seleccionar</option>
                        <option value="frutas">Frutas y verduras</option>
                        <option value="verduras">Proteinas</option>
                        <option value="carnes">Cereales y tuberculos</option>
                        <option value="cereales">Lacteos</option>
                    </select>
                </div>
                <div class="animal-origin-display input-group">
                    <h3>Origen animal</h3>
                    <div class="slide-button">
                        <input type="checkbox" class="toggle">
                        <div class="background-div">
                            <div class="circle-slide"></div>
                        </div>
                    </div>
                </div>
            </article>
            
            <section class="btn-group-actions no-hid">
                <button disabled class="btn btn-primary">Guardar Cambios</button>
                <button disabled class="btn btn-secondary">Descartar Cambios</button>
            </section>
            <section class="btn-group-actions hidden">
                <button disabled class="btn btn-primary">Guardar</button>
                <button disabled class="btn btn-secondary">Descartar</button>
            </section>
        </section>

        <!-- Mobile nav -->
            <footer class="mobile-nav">
                <div class="icon-and-text-mobile">
                    <div class="pot-container">
                        <i class="ph-fill ph-cooking-pot"></i>
                    </div>
                    <div class="mobile-icons">
                        <i class="ph ph-shopping-cart"></i>
                        <i class="ph ph-fork-knife"></i>
                        <i class="ph ph-bowl-food"></i>
                        <i class="ph ph-user"></i>
                    </div>
                </div>
            </footer>
    </section>

</body>
</html>
