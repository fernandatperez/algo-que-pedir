<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/general.css">
    <link rel="stylesheet" href="../css/pages-css/8-ingredient-edit.css">
    <title>Editar ingrediente</title>

</head>
<body>
    <section class="orders-container">
        <!-- Header -->
        <header class="main-nav">

            <div class="icon-and-text">
                <div class="pot-container">
                    <i class="ph-fill ph-cooking-pot"></i>
                </div>
                <h1>Algo que pedir</h1> 
            </div>

            <nav class="options-and-icon">
                <h2 class="active">Pedidos</h2> 
                <h2>Menú</h2> 
                <h2>Ingredientes</h2> 
                <h2>Cuentas</h2> 
                <!-- <i class="ph ph-list hidden"></i> -->
                <label id="nav-hamburger" class="hidden">
                    <input type="checkbox" id="hamburger-toggle">
                    <span class="hidden"></span>
                    <span class="hidden"></span>
                    <span class="hidden"></span>
                </label>
                <i class="ph ph-user-circle"></i>
            </nav>
        </header>

        <section class="main-body">

            <article class="section-title">
                Editar ingrediente
            </article>

            <article class="ingredient-edit-section">
                <h3>Nombre del ingrediente*</h3>
                <input type="text" placeholder="Lechuga">
                <h3>Costo*</h3>
                <div class="absolute-dollar-sign">
                    <p>$</p>
                    <input type="text" placeholder="5">
                </div>
                <h3>Grupo Alimenticio</h3>
                <select>
                    <option value="" disabled selected hidden>Seleccionar</option>
                    <option value="frutas">Frutas y verduras</option>
                    <option value="verduras">Proteinas</option>
                    <option value="carnes">Cereales y tuberculos</option>
                    <option value="cereales">Lacteos</option>
                </select>
                <div class="animal-origin-display">
                    <h3>Origen animal</h3>
                    <div class="slide-button">
                        <div class="background-div">
                            <div class="circle-slide"></div>
                        </div>
                    </div>
                </div>
            </article>
            
            <section class="btn-group-actions">
                <button disabled class="btn-primary">Guardar Cambios</button>
                <button disabled class="btn-secondary">Descartar Cambios</button>
            </section>
        </section>

        <!-- Mobile nav -->
            <footer class="mobile-nav">
                <div class="icon-and-text-mobile">
                    <div class="pot-container">
                        <i class="ph-fill ph-cooking-pot"></i>
                    </div>
                    <div class="mobile-icons">
                        <i class="ph ph-shopping-cart"></i>
                        <i class="ph ph-fork-knife"></i>
                        <i class="ph ph-bowl-food"></i>
                        <i class="ph ph-user"></i>
                    </div>
                </div>
            </footer>
    </section>

</body>
</html>
