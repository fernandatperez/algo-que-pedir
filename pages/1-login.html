<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- FAVICON -->
    <link rel="icon" type="image/x-icon" href="../assets/icons/favicon.ico">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/component-css/input.css">
    <link rel="stylesheet" href="../css/component-css/buttons.css">
    <link rel="stylesheet" href="../css/component-css/icon.css">
    <link rel="stylesheet" href="../css/pages-css/1-login.css">

    <title>Login</title>
  </head>
  <body class="login-container">
      <main class="login-section">

        <!-- HEADER -->
        <header class="header-section">
          <a href="../pages/" class="header-link">
            <span class="pot-container">
              <i class="ph-fill ph-cooking-pot"></i>
            </span>
            <span class="title-header">Algo que pedir</span>
          </a>
        </header>

        <!-- FORM -->
        <form class="form-container">

          <!-- FORM FIELD -->
          <section class="form-field">
            <div>
              <label class="label-color" id="label-usuario">Usuario*</label>
              <input type="email" placeholder="Escribir" id="input-usuario" class="input-primary">
            </div>
            <div>
              <label class="label-color" id="label-contraseña">Contraseña*</label>
              <div class="input-with-icon">
                <input type="password" id="input-contraseña" class="input-primary input-password">
                <i class="ph ph-eye-slash input-icon"></i>
              </div>
            </div>
          </section>

          <!-- FORM ACTIONS -->
          <section class="form-actions">
            <button class="btn btn-primary btn-login">Iniciar Sesión</button>
            <div class="register-section"> 
              <p>¿No tenes una cuenta?</p>
              <a href="" class="register-link">Registrate</a>
            </div>
          </section>
  
        </form>

      </main>

  </body>
</html>
