<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Importo CSS -->
    <link rel="stylesheet" href="/css/pages-css/1-login.css">

    <title>Login</title>
  </head>
  <body>
    <main class="login-container">

      <section class="login-section">

        <!-- HEADER -->
        <header class="header-section">
          <div class="icon-container">
            <i class="ph-fill ph-cooking-pot"></i>
          </div>
          <h1 class="main-title">Algo que pedir</h1>
        </header>

        <!-- FORM -->
        <form class="form-section">
          <div class="form-group">
            <label class="label">Usuario*</label>
            <input type="email" placeholder="Escribir" class="input-primary form-input">
          </div>
          <div class="form-group password-container">
            <label class="label">Contraseña*</label>
            <div class="password-input">
              <input type="password" class="input-primary form-input">
              <i class="ph ph-eye-slash"></i>
            </div>
          </div>
        </form>

        <!-- FORM ACTIONS -->
        <footer class="btn-group" role="group">
          <button class="btn btn-primary btn-login">Iniciar Sesión</button>
          <div class="register-section"> 
            <p>¿No tenes una cuenta?</p>
            <a href="" class="register-link">Registrate</a>
          </div>
        </footer>

      </section>

    </main>
  </body>
</html>
