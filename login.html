<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Importo CSS -->
    <link href="login.css" rel="stylesheet" />
    <title>Iniciar Sesion</title>
  </head>
  <body>
    <div class="card">
      <!-- HEADER -->
      <div class="header-container">
        <div class="icon-container">
          <i class="ph-fill ph-circle"></i> 
          <i class="ph-fill ph-cooking-pot"></i>
        </div>
        <h1 class="main-title">Algo que pedir</h1>
      </div>
      <!-- FORMULARIO -->
      <form class="form-section">
        <div class="form-group">
          <label>Usuario*</label>
          <input type="email" placeholder="Escribir" class="email-input">
        </div>
        <div class="form-group password-container">
          <label>Contraseña*</label>
          <div class="password-input">
            <input type="password">
            <i class="ph ph-eye-slash"></i>
          </div>
        </div>
      </form>
      <!-- FOOTER -->
      <div class="btn-group" role="group">
        <button class="principal-button">Iniciar Sesión</button>
        <div class="secondary-section"> 
          <p>¿No tenes una cuenta?</p>
          <a href="" class="register-link">Regístrate</a>
        </div>
      </div>
    </div>
  </body>
</html>
