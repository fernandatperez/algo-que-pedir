<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos actuales</title>
    <link rel="stylesheet" href="3-style.css">
        <link
        rel="stylesheet"
        type="text/css"
        href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"/> <!-- esto es para los iconos -->
</head>
<body>
    <div class="main-nav">

        <span class="icon-y-text">
            <div class="contenedor-pot">
                <img src="../assets/icons/cooking-pot-white.svg" alt="Icono de cooking pot">
            </div>
            <h2>Algo que pedir</h2> 
        </span>

        <span class="opciones-y-icono">
            <h2>Pedidos</h2> 
            <h2>Menú</h2> 
            <h2>Ingredientes</h2> 
            <h2>Cuentas</h2> 
            <!-- <img src="../assets/icons/default-avatar-profile-icon-vector-600nw.webp" alt="Icono default"> -->
            <i class="ph ph-user-circle"></i>
        </span>

    </div>

    <div class="titulo-tabs-grid">

        <div class="titulo-tabs">
            <div class="titulo">Pedidos actuales</div>
            <div class="tabs">
                <span class="tab active">Pendientes</span>
                <span class="tab">Preparados</span>
                <span class="tab">Entregados</span>
                <span class="tab">Cancelados</span>
            </div>
        </div>

        <div class="main-grid">

            <div class="grid-element">
                    <div class="pedido">Pedido #1234</div>
                    <div class="user">
                        <!-- <img src="../assets/icons/default-avatar-profile-icon-vector-600nw.webp" alt="Foto perfil"> -->
                        <i class="ph ph-user-circle"></i>
                        <div class="user-info">
                            <div class="nombre">Sofía Miller</div>
                            <div class="usuario"><strong>usuario:</strong> smiller2006</div>
                        </div>
                    </div>

                    <div class="detalles">Hora: 12:30 PM | Artículos: 2 | Total: $25</div>

                    <div class="direccion">
                        <div class="ping-container">
                            <i class="ph ph-map-pin"></i>
                        </div>
                        <div>
                            <div><strong>Av siempre viva 555</strong></div>
                            <div class="coordenadas">Lat: 40.7128, Long: -74.0060</div>
                        </div>
                    </div>

                    <div class="pago">
                        <i class="ph ph-credit-card"></i> 
                        <span>Pago con tarjeta de crédito</span>
                    </div>

                    <div class="boton-grid">
                        <button>Preparar</button>
                    </div>
            </div>

            <div class="grid-element">2</div>
            <div class="grid-element">3</div>
            <div class="grid-element">4</div>
            <div class="grid-element">5</div>
            <div class="grid-element">6</div>
            <div class="grid-element">7</div>
        </div>

    </div>


</body>
</html>
